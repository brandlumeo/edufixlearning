{% extends 'base.html' %}

{% block title %}Password Reset Complete - Edufix{% endblock %}

{% block content %}
<section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 120px 0;">
    <div class="container" style="max-width: 450px;">
        <div class="glass" style="padding: 3rem; border-radius: 32px; border: 1px solid var(--glass-border); text-align: center;">
            <div style="margin-bottom: 2rem;">
                <i class="fa-solid fa-circle-check text-yellow" style="font-size: 4rem; margin-bottom: 1.5rem;"></i>
                <h2 style="font-size: 2.2rem; margin-bottom: 1rem;">Password <span class="text-yellow">Updated</span></h2>
                <p class="text-gray">Your password has been successfully reset. You may now log in with your new credentials.</p>
            </div>
            <div style="margin-top: 2rem;">
                <a href="{% url 'login' %}" class="btn btn-primary" style="padding: 1rem 3rem; font-weight: 700;">Log In Now</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
