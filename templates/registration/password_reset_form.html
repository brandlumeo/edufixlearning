{% extends 'base.html' %}

{% block title %}Reset Password - Edufix{% endblock %}

{% block content %}
<section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 120px 0;">
    <div class="container" style="max-width: 450px;">
        <div class="glass" style="padding: 3rem; border-radius: 32px; border: 1px solid var(--glass-border);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2.2rem; margin-bottom: 1rem;">Reset Your <span class="text-yellow">Password</span></h2>
                <p class="text-gray">Enter your email and we'll send you a secure link to reset your account access.</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
                    <input type="email" name="email" class="form-control glass" placeholder="name@example.com" required style="width: 100%; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid var(--glass-border); color: white; background: rgba(255,255,255,0.05);">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: 12px; font-weight: 700; text-transform: uppercase;">
                    Send Reset Link
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="{% url 'login' %}" class="text-yellow" style="font-weight: 600;">Back to Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
